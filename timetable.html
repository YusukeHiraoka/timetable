<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="千葉工大時間割">
<title>千葉工業大学 専用時間割アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f7fa; min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 8px 4px; }
  h1 { text-align: center; font-size: 16px; color: #1a3a6b; font-weight: 800; margin: 8px 0 2px; }
  p.sub { text-align: center; font-size: 12px; color: #555; margin: 0 0 12px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 13px; font-weight: 700; color: #555; padding: 4px 2px; text-align: center; }
  th.time-col { width: 38px; }
  .period-label { font-weight: 700; font-size: 12px; color: #777; }
  .period-time { font-size: 9px; color: #999; line-height: 1.3; }
  td.period-td { text-align: center; vertical-align: middle; padding: 2px 0; }
  td.cell-td { padding: 2px; }
  .cell {
    min-height: 52px; border-radius: 8px; background: #e8ecf0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; font-size: 11px; cursor: pointer;
    padding: 4px 2px; text-align: center; line-height: 1.3;
    user-select: none; color: #bbb;
  }
  .cell.filled { color: #fff; font-weight: 600; }
  .cell .c-name { font-size: 12px; font-weight: 700; }
  .cell .c-room, .cell .c-teacher { font-size: 10px; opacity: 0.85; }
  .plus { font-size: 18px; }

  /* Modal */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  #overlay.show { display: flex; }
  #modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 32px; width: 100%; max-width: 480px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header span { font-weight: 700; font-size: 16px; }
  .modal-header button { border: none; background: none; font-size: 20px; cursor: pointer; color: #999; }
  .colors { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-dot.selected { border-color: #333; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .field input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; outline: none; }
  .btns { display: flex; gap: 8px; margin-top: 8px; }
  .btn-del { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #fde8e8; color: #e05470; font-weight: 700; font-size: 14px; cursor: pointer; display: none; }
  .btn-save { flex: 2; padding: 12px; border-radius: 12px; border: none; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<h1>🎓 千葉工業大学</h1>
<p class="sub">専用時間割アプリ</p>

<table>
  <thead>
    <tr>
      <th class="time-col"></th>
      <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div id="overlay">
  <div id="modal">
    <div class="modal-header">
      <span id="modal-title"></span>
      <button onclick="closeModal()">✕</button>
    </div>
    <div class="colors" id="color-picker"></div>
    <div class="field"><label>授業名 *</label><input id="f-name" placeholder="例: 線形代数"></div>
    <div class="field"><label>教室</label><input id="f-room" placeholder="例: A棟201"></div>
    <div class="field"><label>教員名</label><input id="f-teacher" placeholder="例: 山田 太郎"></div>
    <div class="btns">
      <button class="btn-del" id="btn-del" onclick="deleteClass()">削除</button>
      <button class="btn-save" id="btn-save" onclick="saveClass()">保存</button>
    </div>
  </div>
</div>

<script>
const DAYS = ["月","火","水","木","金"];
const PERIODS = [
  {n:1,t:"9:00\n10:30"},{n:2,t:"10:40\n12:10"},{n:3,t:"13:00\n14:30"},
  {n:4,t:"14:40\n16:10"},{n:5,t:"16:20\n17:50"},{n:6,t:"18:00\n19:00"},
  {n:7,t:"–"},{n:8,t:"–"},{n:9,t:"–"},{n:10,t:"–"}
];
const COLORS = ["#4F86C6","#E07B54","#5BAD72","#C46DB0","#E0B830","#5BBFBF","#E05470","#8F7CC6"];

let classes = JSON.parse(localStorage.getItem("cit_timetable") || "{}");
let curDay, curPeriod, curColor = COLORS[0];

function k(d,p){ return d+"-"+p; }

// Build table
const tbody = document.getElementById("tbody");
PERIODS.forEach(p => {
  const tr = document.createElement("tr");
  const times = p.t.split("\n");
  tr.innerHTML = `<td class="period-td"><div class="period-label">${p.n}</div>${times.map(t=>`<div class="period-time">${t}</div>`).join("")}</td>`;
  DAYS.forEach((_,di) => {
    const td = document.createElement("td");
    td.className = "cell-td";
    td.innerHTML = `<div class="cell" id="cell-${di}-${p.n}" onclick="openModal(${di},${p.n})"><span class="plus">+</span></div>`;
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
});

// Color picker
const cp = document.getElementById("color-picker");
COLORS.forEach(c => {
  const d = document.createElement("div");
  d.className = "color-dot" + (c===COLORS[0]?" selected":"");
  d.style.background = c;
  d.onclick = () => { curColor = c; document.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("selected")); d.classList.add("selected"); document.getElementById("btn-save").style.background = c; };
  cp.appendChild(d);
});

function renderAll() {
  Object.entries(classes).forEach(([key, v]) => {
    const el = document.getElementById("cell-"+key);
    if (!el) return;
    el.style.background = v.color;
    el.classList.add("filled");
    el.innerHTML = `<div class="c-name">${v.name}</div>${v.room?`<div class="c-room">${v.room}</div>`:""}${v.teacher?`<div class="c-teacher">${v.teacher}</div>`:""}`;
  });
}
renderAll();

function openModal(day, period) {
  curDay = day; curPeriod = period;
  const v = classes[k(day,period)] || {};
  document.getElementById("modal-title").textContent = DAYS[day]+"曜 "+period+"限";
  document.getElementById("f-name").value = v.name||"";
  document.getElementById("f-room").value = v.room||"";
  document.getElementById("f-teacher").value = v.teacher||"";
  curColor = v.color||COLORS[0];
  document.querySelectorAll(".color-dot").forEach(x=>{ x.classList.toggle("selected", x.style.background===hexToRgb(curColor)||x.style.background===curColor); });
  document.getElementById("btn-save").style.background = curColor;
  document.getElementById("btn-del").style.display = classes[k(day,period)] ? "block" : "none";
  document.getElementById("overlay").classList.add("show");
}

function closeModal() { document.getElementById("overlay").classList.remove("show"); }

function saveClass() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { deleteClass(); return; }
  classes[k(curDay,curPeriod)] = { name, room: document.getElementById("f-room").value.trim(), teacher: document.getElementById("f-teacher").value.trim(), color: curColor };
  localStorage.setItem("cit_timetable", JSON.stringify(classes));
  const el = document.getElementById("cell-"+k(curDay,curPeriod));
  el.style.background = curColor;
  el.classList.add("filled");
  el.innerHTML = `<div class="c-name">${classes[k(curDay,curPeriod)].name}</div>${classes[k(curDay,curPeriod)].room?`<div class="c-room">${classes[k(curDay,curPeriod)].room}</div>`:""}${classes[k(curDay,curPeriod)].teacher?`<div class="c-teacher">${classes[k(curDay,curPeriod)].teacher}</div>`:""}`;
  closeModal();
}

function deleteClass() {
  delete classes[k(curDay,curPeriod)];
  localStorage.setItem("cit_timetable", JSON.stringify(classes));
  const el = document.getElementById("cell-"+k(curDay,curPeriod));
  el.style.background = "";
  el.classList.remove("filled");
  el.innerHTML = `<span class="plus">+</span>`;
  closeModal();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

document.getElementById("overlay").addEventListener("click", e => { if(e.target===document.getElementById("overlay")) closeModal(); });
</script>
</body>
</html>
